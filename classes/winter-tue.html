<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class 10 冬・火曜クラス | 人文学と対話（2026）</title>
  <script src="../auth.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Noto Sans JP"', '"Zen Kaku Gothic New"', 'sans-serif'] } } } }
  </script>
  <style>
    * { font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', sans-serif; }
    .gradient-bg {
      background: linear-gradient(-45deg, #fef3c7, #fce7f3, #e0e7ff, #ccfbf1, #fef3c7);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .glass { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.8); }
    .glass-strong { background: rgba(255,255,255,0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.9); }
    .gradient-text { background: linear-gradient(135deg, #7c3aed, #ec4899, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: blobFloat 8s ease-in-out infinite; }
    @keyframes blobFloat { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.1); } 66% { transform: translate(-20px,20px) scale(0.9); } }
    .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.4,0,0.2,1); }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    html { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 4px; }
  </style>
</head>
<body class="gradient-bg min-h-screen relative overflow-x-hidden">
  <div class="blob w-96 h-96 bg-purple-300 top-20 -left-48 fixed" style="animation-delay: 0s;"></div>
  <div class="blob w-80 h-80 bg-pink-300 top-1/2 -right-40 fixed" style="animation-delay: 2s;"></div>

  <!-- Navigation -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass-strong">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <a href="../" class="flex items-center gap-2 text-gray-600 hover:text-purple-600 transition-colors text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        <span data-i18n="winter_tue_nav_back">トップに戻る</span>
      </a>
      <button id="lang-toggle" onclick="toggleLang()" class="px-3 py-1.5 rounded-full text-xs font-bold bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all">EN</button>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 pt-24 pb-20">
    <!-- Header -->
    <div class="text-center mb-12 fade-in">
      <p class="text-sm font-semibold text-purple-600 tracking-widest uppercase mb-3" data-i18n="winter_tue_course_name">人文学と対話 2026</p>
      <h1 class="text-3xl sm:text-4xl font-black mb-2" data-i18n="winter_tue_class_title">
        <span class="gradient-text">Class 10　冬・火曜</span>クラス
      </h1>
      <p class="text-gray-500 text-sm" data-i18n="winter_tue_class_info">担当教員・TA・受講生の情報</p>
    </div>

    <!-- 担当教員 -->
    <div class="fade-in glass rounded-3xl p-6 sm:p-8 mb-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center text-xl">👩‍🏫</div>
        <h2 class="font-bold text-lg text-gray-800" data-i18n="winter_tue_instructor">担当教員</h2>
      </div>
      <p class="text-sm text-gray-400 italic" data-i18n="winter_tue_tba_1">（後日掲載）</p>
    </div>

    <!-- TA -->
    <div class="fade-in glass rounded-3xl p-6 sm:p-8 mb-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-pink-100 rounded-xl flex items-center justify-center text-xl">🎓</div>
        <h2 class="font-bold text-lg text-gray-800" data-i18n="winter_tue_ta">ティーチングアシスタント（TA）</h2>
      </div>
      <p class="text-sm text-gray-400 italic" data-i18n="winter_tue_tba_2">（後日掲載）</p>
    </div>

    <!-- 受講生 -->
    <div class="fade-in glass rounded-3xl p-6 sm:p-8 mb-10">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center text-xl">👥</div>
        <h2 class="font-bold text-lg text-gray-800" data-i18n="winter_tue_students">受講生</h2>
      </div>
      <p class="text-sm text-gray-400 italic" data-i18n="winter_tue_tba_3">（後日掲載）</p>
    </div>

    <!-- Back -->
    <div class="text-center fade-in">
      <a href="../" class="inline-flex items-center gap-2 bg-gray-900 text-white px-8 py-4 rounded-2xl font-semibold hover:bg-gray-800 transition-all hover:shadow-xl">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        <span data-i18n="winter_tue_back_bottom">トップに戻る</span>
      </a>
    </div>
  </main>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>

  <script>
const i18n_en = {
  "winter_tue_nav_back": "Back to Top",
  "winter_tue_course_name": "Humanities &amp; Dialogue 2026",
  "winter_tue_class_title": "<span class=\"gradient-text\">Winter / Tuesday</span> Class",
  "winter_tue_class_info": "Instructor, TA &amp; Student Information",
  "winter_tue_instructor": "Instructor",
  "winter_tue_ta": "Teaching Assistant (TA)",
  "winter_tue_tba_1": "(To be announced)",
  "winter_tue_tba_2": "(To be announced)",
  "winter_tue_tba_3": "(To be announced)",
  "winter_tue_students": "Students",
  "winter_tue_back_bottom": "Back to Top"
};
let currentLang = sessionStorage.getItem('hd_lang') || 'ja';
const jaTexts = {};
document.querySelectorAll('[data-i18n]').forEach(el => {
  jaTexts[el.getAttribute('data-i18n')] = el.innerHTML;
});
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (currentLang === 'en' && i18n_en[key]) el.innerHTML = i18n_en[key];
    else if (jaTexts[key]) el.innerHTML = jaTexts[key];
  });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = currentLang === 'ja' ? 'EN' : 'JP';
}
function toggleLang() {
  currentLang = currentLang === 'ja' ? 'en' : 'ja';
  sessionStorage.setItem('hd_lang', currentLang);
  applyLang();
}
applyLang();
</script>
</body>
</html>
